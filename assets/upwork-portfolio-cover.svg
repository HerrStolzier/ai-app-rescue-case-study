    <text x="26" y="82" fill="#c8d4e3" font-family="Arial, Helvetica, sans-serif" font-size="19">CSV/API to report workflow</text>
    <text x="26" y="116" fill="#75e0a7" font-family="Arial, Helvetica, sans-serif" font-size="18">repeatable script tests</text>
  </g>

  <g transform="translate(528 386)">
