    <text x="26" y="82" fill="#c8d4e3" font-family="Arial, Helvetica, sans-serif" font-size="19">RLS, auth and upsert fix</text>
    <text x="26" y="116" fill="#75e0a7" font-family="Arial, Helvetica, sans-serif" font-size="18">policy-safe test path</text>
  </g>

  <g transform="translate(84 386)">
    <rect width="388" height="146" rx="12" fill="#172033" stroke="#46516f"/>
