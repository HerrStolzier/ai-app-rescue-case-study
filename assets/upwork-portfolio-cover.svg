<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="750" viewBox="0 0 1000 750" role="img" aria-labelledby="title desc">
  <title id="title">AI App Rescue Case Studies</title>
  <desc id="desc">Portfolio cover for four verified software repair case studies.</desc>
  <rect width="1000" height="750" fill="#08111a"/>
  <rect x="48" y="48" width="904" height="654" rx="16" fill="#101b27" stroke="#27364a" stroke-width="2"/>
  <text x="84" y="118" fill="#f4f7fb" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">AI App Rescue</text>
  <text x="86" y="156" fill="#93c5fd" font-family="Arial, Helvetica, sans-serif" font-size="23">failure - diagnosis - minimal fix - verification - handover</text>

  <g transform="translate(84 212)">
    <rect width="388" height="146" rx="12" fill="#132235" stroke="#355071"/>
    <text x="26" y="45" fill="#f4f7fb" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Next.js / Vercel</text>
    <text x="26" y="82" fill="#c8d4e3" font-family="Arial, Helvetica, sans-serif" font-size="19">route failure rescue</text>
    <text x="26" y="116" fill="#75e0a7" font-family="Arial, Helvetica, sans-serif" font-size="18">verified local regression</text>
  </g>

  <g transform="translate(528 212)">
