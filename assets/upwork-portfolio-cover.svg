    <text x="26" y="82" fill="#c8d4e3" font-family="Arial, Helvetica, sans-serif" font-size="19">hardening and cleanup</text>
    <text x="26" y="116" fill="#75e0a7" font-family="Arial, Helvetica, sans-serif" font-size="18">guardrails, tests, handover</text>
  </g>

  <rect x="84" y="594" width="832" height="64" rx="10" fill="#0c1623" stroke="#253a54"/>
  <text x="112" y="633" fill="#d8e2ef" font-family="Arial, Helvetica, sans-serif" font-size="20">github.com/HerrStolzier/ai-app-rescue-case-study</text>
